services:
  # ───────────────────────────────────────────────────────────────
  # MODO POR DEFECTO — conecta contra el Postgres real de desarrollo
  # (contenedor sca_it_db, levantado por el docker-compose.yml de la
  # raíz del proyecto Laravel), en la base sca_it ya migrada/seedeada.
  # host.docker.internal es cómo un contenedor alcanza el "localhost"
  # del host Docker; extra_hosts es necesario en Linux (en Docker
  # Desktop de Mac/Windows ya funciona sin él, pero no está de más).
  # ───────────────────────────────────────────────────────────────
  servicio-auditoria:
    build: .
    ports:
      - "3020:3000"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_DATABASE: sca_it
      DB_USERNAME: sca_user
      DB_PASSWORD: ${DB_PASSWORD:-sca_secret}
    extra_hosts:
      - "host.docker.internal:host-gateway"


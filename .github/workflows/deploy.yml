name: CI/CD — SCA-IT

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  tests:
    name: Tests PHP
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sca_it_test
          POSTGRES_USER: sca_user
          POSTGRES_PASSWORD: sca_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, gd, zip, bcmath, intl

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist

      - name: Instalar dependencias Node y compilar assets
        run: |
          npm ci
          npm run build

      - name: Configurar .env para tests
        run: |
          printf "APP_NAME=SCA-IT\nAPP_ENV=testing\nAPP_KEY=\nAPP_DEBUG=true\nAPP_URL=http://localhost\nDB_CONNECTION=pgsql\nDB_HOST=127.0.0.1\nDB_PORT=5432\nDB_DATABASE=sca_it_test\nDB_USERNAME=sca_user\nDB_PASSWORD=sca_secret\nSESSION_DRIVER=array\nCACHE_STORE=array\nQUEUE_CONNECTION=sync\nFILESYSTEM_DISK=local\nAZURE_STORAGE_NAME=fake\nAZURE_STORAGE_KEY=fake\nAZURE_STORAGE_CONTAINER=fake\n" > .env
          php artisan key:generate

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Ejecutar tests Pest
        run: php artisan test --compact

  build-and-scan:
    name: Build + Scan Trivy
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v7

      - name: Normalizar nombre de imagen a minúsculas
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Reemplaza docker/metadata-action@v5: esa acción llama incondicionalmente
      # a GET /repos/{owner}/{repo} (sin try/catch) para generar labels OCI
      # automáticos, y ese endpoint viene fallando con 500 intermitentes.
      # Estos tags no necesitan ninguna llamada a la API de GitHub.
      - name: Metadata de la imagen
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          TAGS="${REGISTRY}/${IMAGE_NAME}:sha-${SHA_SHORT}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build imagen Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          load: true

      - name: Scan de vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Subir resultados de Trivy a GitHub Security
        uses: github/codeql-action/upload-sarif@v4.37.0
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

      - name: Push imagen a GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy a AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v7

      - name: Normalizar nombre de imagen a minúsculas
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # docker-compose.prod.yml no vive en los hosts EC2 (el deploy nunca
      # clona el repo ahí) — hay que copiarlo antes de poder usar
      # `docker compose -f docker-compose.prod.yml ...` contra ese archivo.
      - name: Copiar docker-compose.prod.yml a EC2-A
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_A_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/"

      - name: Deploy a EC2-A (us-east-1a)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_A_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export APP_KEY="${{ secrets.APP_KEY }}"
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export AZURE_STORAGE_NAME="${{ secrets.AZURE_STORAGE_NAME }}"
            export AZURE_STORAGE_KEY="${{ secrets.AZURE_STORAGE_KEY }}"
            docker compose -f docker-compose.prod.yml pull sca-it
            docker compose -f docker-compose.prod.yml up -d sca-it
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T sca-it php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T sca-it php artisan optimize:clear
            docker image prune -af

      - name: Copiar docker-compose.prod.yml a EC2-B
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_B_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/"

      - name: Deploy a EC2-B (us-east-1b)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_B_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export APP_KEY="${{ secrets.APP_KEY }}"
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export AZURE_STORAGE_NAME="${{ secrets.AZURE_STORAGE_NAME }}"
            export AZURE_STORAGE_KEY="${{ secrets.AZURE_STORAGE_KEY }}"
            docker compose -f docker-compose.prod.yml pull sca-it
            docker compose -f docker-compose.prod.yml up -d sca-it
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T sca-it php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T sca-it php artisan optimize:clear
            docker image prune -af
